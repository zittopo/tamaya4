<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>ToDoアプリ</title>
  <style>
    body {
      font-family: sans-serif;
      text-align: center;
      background: #f0f0f0;
    }
    h1 {
      margin-top: 30px;
    }
    input {
      padding: 10px;
      width: 200px;
    }
    button {
      padding: 10px;
      margin-left: 5px;
    }
    ul {
      list-style: none;
      padding: 0;
    }
    li {
      background: white;
      margin: 10px auto;
      padding: 10px;
      width: 300px;
      display: flex;
      justify-content: space-between;
    }
  </style>
</head>
<body>

  <h1>ToDoアプリ</h1>

  <input id="taskInput" type="text" placeholder="やること入力">
  <button onclick="addTask()">追加</button>

  <ul id="taskList"></ul>

  <script>
    let tasks = [];

    // 保存
    function saveTasks() {
      localStorage.setItem("tasks", JSON.stringify(tasks));
    }

    // 読み込み
    function loadTasks() {
      const data = localStorage.getItem("tasks");
      if (data) {
        tasks = JSON.parse(data);
        tasks.forEach(task => renderTask(task));
      }
    }

    // 表示
    function renderTask(task) {
      const li = document.createElement("li");
      li.textContent = task;

      const deleteBtn = document.createElement("button");
      deleteBtn.textContent = "削除";
      deleteBtn.onclick = function () {
        li.remove();
        tasks = tasks.filter(t => t !== task);
        saveTasks();
      };

      li.appendChild(deleteBtn);
      document.getElementById("taskList").appendChild(li);
    }

    // 追加
    function addTask() {
      const input = document.getElementById("taskInput");
      const text = input.value;

      if (text === "") return;

      tasks.push(text);
      saveTasks();
      renderTask(text);

      input.value = "";
    }

    // ページ読み込み時
    loadTasks();
  </script>

</body>
</html>
