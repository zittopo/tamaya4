<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>ToDoアプリ</title>
  <style>
    body {
      font-family: sans-serif;
      text-align: center;
      background: #f0f0f0;
    }
    h1 {
      margin-top: 30px;
    }
    input {
      padding: 10px;
      margin: 5px;
    }
    button {
      padding: 10px;
    }
    ul {
      list-style: none;
      padding: 0;
    }
    li {
      background: white;
      margin: 10px auto;
      padding: 10px;
      width: 350px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .overdue {
      color: red;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <h1>ToDoアプリ</h1>

  <input id="taskInput" type="text" placeholder="やること">
  <input id="dateInput" type="date">
  <button onclick="addTask()">追加</button>

  <ul id="taskList"></ul>

  <script>
    let tasks = [];

    function saveTasks() {
      localStorage.setItem("tasks", JSON.stringify(tasks));
    }

    function loadTasks() {
      const data = localStorage.getItem("tasks");
      if (data) {
        tasks = JSON.parse(data);
        tasks.forEach(task => renderTask(task));
      }
    }

    function renderTask(task) {
      const li = document.createElement("li");

      const today = new Date().toISOString().split("T")[0];

      const textSpan = document.createElement("span");
      textSpan.textContent = `${task.text}（期限: ${task.date || "なし"}）`;

      // 期限切れチェック
      if (task.date && task.date < today) {
        textSpan.classList.add("overdue");
      }

      const deleteBtn = document.createElement("button");
      deleteBtn.textContent = "削除";
      deleteBtn.onclick = function () {
        li.remove();
        tasks = tasks.filter(t => !(t.text === task.text && t.date === task.date));
        saveTasks();
      };

      li.appendChild(textSpan);
      li.appendChild(deleteBtn);

      document.getElementById("taskList").appendChild(li);
    }

    function addTask() {
      const text = document.getElementById("taskInput").value;
      const date = document.getElementById("dateInput").value;

      if (text === "") return;

      const task = { text: text, date: date };

      tasks.push(task);
      saveTasks();
      renderTask(task);

      document.getElementById("taskInput").value = "";
      document.getElementById("dateInput").value = "";
    }

    loadTasks();
  </script>

</body>
</html>
