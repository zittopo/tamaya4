<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>ToDoアプリ</title>
  <style>
    body {
      font-family: sans-serif;
      text-align: center;
      background: #f0f0f0;
    }
    h1 {
      margin-top: 30px;
    }
    input {
      padding: 10px;
      width: 200px;
    }
    button {
      padding: 10px;
      margin-left: 5px;
    }
    ul {
      list-style: none;
      padding: 0;
    }
    li {
      background: white;
      margin: 10px auto;
      padding: 10px;
      width: 300px;
      display: flex;
      justify-content: space-between;
    }
  </style>
</head>
<body>

  <h1>ToDoアプリ</h1>

  <input id="taskInput" type="text" placeholder="やること入力">
  <button onclick="addTask()">追加</button>

  <ul id="taskList"></ul>

  <script>
    function addTask() {
      const input = document.getElementById("taskInput");
      const text = input.value;

      if (text === "") return;

      const li = document.createElement("li");
      li.textContent = text;

      const deleteBtn = document.createElement("button");
      deleteBtn.textContent = "削除";
      deleteBtn.onclick = function () {
        li.remove();
      };

      li.appendChild(deleteBtn);

      document.getElementById("taskList").appendChild(li);

      input.value = "";
    }
  </script>

</body>
</html>
